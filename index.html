<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jay Zahiri — Jay Marketing Lab</title>
  <meta name="description" content="Jay Zahiri, CEO of Jay Marketing Lab. We stay, you scale." />
  <meta property="og:title" content="Jay Zahiri — Jay Marketing Lab" />
  <meta property="og:description" content="We stay, you scale." />
  <meta name="theme-color" content="#05020f" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Brand colors — exact values from JML brand guide */
      --brand: #4c0099;   /* Primary purple (R:76 G:0 B:153) */
      --mid:   #7e00ff;   /* Tier-7 purple for gradients */
      --lime:  #b1eb1e;   /* Secondary lime (R:177 G:235 B:30) */
      --ink:   #190033;   /* Primary palette darkest (R:25 G:0 B:51) */

      --bg:        #05020f;
      --surface:   rgba(25, 0, 51, 0.55);
      --text:      #F4EFFF;
      --text-mut:  #A89BC4;
      --border:    rgba(244, 239, 255, 0.12);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .space-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(55, 15, 110, 0.55) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 15% 80%, rgba(10, 5, 60, 0.7) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0c0520 0%, #05020f 100%);
    }

    .aurora {
      position: fixed;
      top: -80px; left: -10%;
      width: 120%; height: 260px;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(80, 20, 160, 0.18) 0%,
        rgba(50, 10, 100, 0.10) 50%,
        transparent 100%);
      filter: blur(30px);
      animation: auroraDrift 14s ease-in-out infinite alternate;
    }
    @keyframes auroraDrift {
      0%   { transform: translateX(-3%) skewX(-2deg); opacity: 0.6; }
      100% { transform: translateX(3%)  skewX(2deg);  opacity: 1; }
    }

    #sky {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .horizon {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 30%;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(to top, rgba(8, 2, 30, 0.85) 0%, transparent 100%);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 32px 32px 26px;
      border-radius: 24px;
    }
    /* Card's visual frame lives on a pseudo-element so logo/avatar inside
       can be visible during scene 1 even before the card frame fades in */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background:
        linear-gradient(135deg,
          rgba(244, 239, 255, 0.04) 0%,
          rgba(244, 239, 255, 0) 60%,
          rgba(177, 235, 30, 0.04) 100%),
        var(--surface);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--border);
      box-shadow:
        0 30px 80px -30px rgba(0, 0, 0, .8),
        0 1px 0 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 0 rgba(177, 235, 30, 0.04) inset;
      opacity: 0;
      transform: scale(0.96) translateY(20px);
    }
    .ready .card::before {
      animation: cardFrameIn 1.4s 2.5s var(--ease) forwards;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    /* ─── JML Logo with motion ─── */
    /* Container animations (fade-in, move-to-final, idle float) are driven by WAAPI in JS,
       so the dynamic translate values can resolve correctly across all browsers.
       Logo SVG children's animations stay as CSS (they're position-independent). */
    .logo-stage {
      width: 150px;
      flex-shrink: 0;
      opacity: 0;
      transform-origin: center center;
      will-change: transform, opacity;
    }
    .logo-stage svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* All logo parts start hidden */
    .logo-stage #g-j,
    .logo-stage #g-arrow,
    .logo-stage #g-jay,
    .logo-stage #g-wordmark,
    .logo-stage #g-search,
    .logo-stage #g-wifi-1,
    .logo-stage #g-wifi-2,
    .logo-stage #g-wifi-3,
    .logo-stage #g-wifi-dot,
    .logo-stage #g-bar-outline { opacity: 0; }

    /* Logo entrance choreography (compressed timing) — gated on .ready */
    .ready .logo-stage #g-j        { animation: logoRise   .9s .35s var(--ease) forwards; }
    .ready .logo-stage #g-arrow    { animation: arrowSnap  .8s .55s var(--ease) forwards; }
    .ready .logo-stage #g-search   { animation: popInLogo  .6s .85s var(--ease) forwards; }
    .ready .logo-stage #g-jay      { animation: slideFadeR .9s .50s var(--ease) forwards; }
    .ready .logo-stage #g-wordmark { animation: slideFadeR .9s .70s var(--ease) forwards; }
    .ready .logo-stage #g-wifi-1   { animation: fadeScale  .5s 1.0s var(--ease) forwards; }
    .ready .logo-stage #g-wifi-2   { animation: fadeScale  .5s 1.15s var(--ease) forwards; }
    .ready .logo-stage #g-wifi-3   { animation: fadeScale  .5s 1.30s var(--ease) forwards; }
    .ready .logo-stage #g-wifi-dot { animation: fadeScale  .5s 1.45s var(--ease) forwards; }
    .ready .logo-stage #g-bar-outline { animation: fadeIn  .6s 1.55s ease forwards; }
    .ready .logo-stage #g-bar-fill {
      transform: scaleX(0);
      transform-origin: left center;
      transform-box: fill-box;
      animation: barFill 1s 1.65s var(--ease) forwards;
    }
    .ready .logo-stage #g-wifi {
      transform-origin: 26px 276px;
      transform-box: fill-box;
      animation: wifiBreathe 5s ease-in-out 3.5s infinite;
    }

    .lang-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: .15em;
      color: var(--text-mut);
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
      flex-shrink: 0;
      opacity: 0;
    }
    .ready .lang-tag { animation: fadeIn .8s 3.7s ease forwards; }

    /* ─── Identity row (avatar + name side by side at final position) ─── */
    .identity-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .avatar-wrap {
      flex-shrink: 0;
      opacity: 0;
      transform-origin: center center;
      will-change: transform, opacity;
    }
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(38, 0, 77, 0.8);
      border: 2px solid var(--lime);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      color: var(--lime);
      box-shadow:
        0 10px 30px -10px rgba(177, 235, 30, 0.35),
        0 0 0 5px rgba(177, 235, 30, 0.06);
      overflow: hidden;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      line-height: .92;
      letter-spacing: -.02em;
      flex: 1;
      min-width: 0;
    }
    .name .first {
      display: block;
      font-size: clamp(42px, 11vw, 56px);
      opacity: 0;
      transform: translateY(16px);
    }
    .ready .name .first { animation: riseIn 1.1s 3.9s var(--ease) forwards; }

    .name .last {
      display: block;
      font-size: clamp(22px, 5.4vw, 27px);
      font-style: italic;
      color: var(--lime);
      margin-top: 4px;
      letter-spacing: -.005em;
      opacity: 0;
      transform: translateX(-12px);
    }
    .ready .name .last { animation: slideFadeIn 1.1s 4.1s var(--ease) forwards; }

    .role {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      opacity: 0;
    }
    .ready .role { animation: fadeIn .9s 4.3s ease forwards; }
    .role .org { color: var(--text-mut); }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-size: 15px;
      color: var(--text-mut);
      margin-bottom: 22px;
      line-height: 1.4;
      opacity: 0;
    }
    .ready .tagline { animation: fadeIn .9s 4.45s ease forwards; }

    .divider {
      width: 0;
      height: 2px;
      background: linear-gradient(to right, var(--mid), var(--lime));
      margin: 0 0 20px;
      border-radius: 1px;
      box-shadow: 0 0 12px rgba(177, 235, 30, 0.4);
    }
    .ready .divider { animation: drawIn .8s 4.6s var(--ease) forwards; }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 22px;
    }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      transition: background-color .2s ease;
      margin: 0 -14px;
      opacity: 0;
      transform: translateX(-12px);
    }
    .ready .contact-row:nth-child(1) { animation: slideFadeIn 1s 4.75s var(--ease) forwards; }
    .ready .contact-row:nth-child(2) { animation: slideFadeIn 1s 4.85s var(--ease) forwards; }
    .ready .contact-row:nth-child(3) { animation: slideFadeIn 1s 4.95s var(--ease) forwards; }
    .ready .contact-row:nth-child(4) { animation: slideFadeIn 1s 5.05s var(--ease) forwards; }

    .contact-row:hover, .contact-row:focus-visible {
      background: rgba(255,255,255,0.03);
      outline: none;
    }
    .contact-row:hover .contact-icon {
      border-color: var(--lime);
      color: var(--lime);
      box-shadow: 0 0 18px rgba(177, 235, 30, 0.25);
    }

    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(38, 0, 77, 0.8);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mut);
      flex-shrink: 0;
      transition: all .4s var(--ease);
    }
    .contact-icon svg { width: 14px; height: 14px; }

    .contact-text { flex: 1; min-width: 0; }
    .contact-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-mut);
      margin-bottom: 2px;
    }
    .contact-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      opacity: 0;
    }
    .ready .actions { animation: riseIn 1s 5.25s var(--ease) forwards; }
    .actions .btn-primary { grid-column: 1 / -1; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 20px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: .01em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all .25s var(--ease);
      text-decoration: none;
    }
    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: var(--lime);
      color: var(--ink);
      border-color: var(--lime);
      font-weight: 600;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px -8px var(--lime);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.04);
      border-color: var(--text-mut);
    }

    .footer {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
    }
    .ready .footer { animation: fadeIn 1s 5.45s ease forwards; }
    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-mut);
    }

    /* ─── QR modal ─── */
    .qr-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .qr-modal[hidden] { display: none; }
    .qr-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 2, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: fadeIn .3s ease forwards;
    }
    .qr-card {
      position: relative;
      background: rgba(25, 0, 51, 0.92);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 28px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,.7);
      animation: qrCardIn .5s var(--ease) forwards;
    }
    @keyframes qrCardIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .qr-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mut);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s var(--ease);
    }
    .qr-close:hover { color: var(--text); border-color: var(--text-mut); }
    .qr-close svg { width: 14px; height: 14px; }
    .qr-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: .2em;
      color: var(--lime);
      margin-bottom: 8px;
    }
    .qr-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -.01em;
      color: var(--text);
      margin: 0 0 20px;
      line-height: 1;
    }
    .qr-title span {
      font-style: italic;
      color: var(--lime);
    }
    .qr-img-wrap {
      background: white;
      border-radius: 14px;
      padding: 14px;
      display: inline-block;
      margin-bottom: 16px;
      box-shadow: 0 0 0 4px rgba(177, 235, 30, 0.15);
      position: relative;
      min-width: 248px;
      min-height: 248px;
    }
    .qr-img-wrap img {
      display: block;
      width: 220px;
      height: 220px;
    }
    .qr-img-wrap img:not([src]),
    .qr-img-wrap img[src=""] {
      opacity: 0;
    }
    .qr-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4c0099;
      pointer-events: none;
    }
    .qr-loading svg {
      width: 32px;
      height: 32px;
      animation: qrSpin 1s linear infinite;
    }
    .qr-loading.hidden { display: none; }
    .qr-img-wrap img.loaded ~ .qr-loading,
    .qr-img-wrap .qr-loading.hidden {
      display: none;
    }
    @keyframes qrSpin {
      to { transform: rotate(360deg); }
    }
    .qr-error {
      position: absolute;
      inset: 14px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      text-align: center;
      color: #4c0099;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      line-height: 1.4;
    }
    .qr-error.show { display: flex; }
    .qr-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-mut);
      word-break: break-all;
      margin-bottom: 18px;
      line-height: 1.4;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all .2s ease;
    }
    .qr-url:hover {
      color: var(--text);
      border-color: var(--text-mut);
      background: rgba(177, 235, 30, 0.04);
    }
    .qr-url::before {
      content: 'Tap to copy · ';
      color: var(--lime);
      font-size: 9px;
      letter-spacing: .15em;
      text-transform: uppercase;
    }
    .qr-download {
      width: 100%;
    }
    @media (max-width: 380px) {
      .qr-img-wrap img { width: 180px; height: 180px; }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: rgba(25, 0, 51, 0.95);
      backdrop-filter: blur(12px);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      box-shadow: 0 14px 40px -12px rgba(0, 0, 0, .6);
      z-index: 100;
      transition: transform .35s var(--ease);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Keyframes ─── */
    @keyframes cardFrameIn {
      0%   { opacity: 0; transform: scale(0.96) translateY(20px); }
      60%  { opacity: 1; transform: scale(1.005) translateY(-1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes logoRise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes arrowSnap {
      0%   { opacity: 0; transform: translate(-4px, 5px) scale(0.7); }
      65%  { opacity: 1; transform: translate(1px, -1px) scale(1.05); }
      100% { opacity: 1; transform: translate(0, 0) scale(1); }
    }
    @keyframes slideFadeR {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.3); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes popInLogo {
      0%   { opacity: 0; transform: scale(0.3); }
      70%  { opacity: 1; transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes barFill {
      to { transform: scaleX(1); }
    }
    @keyframes wifiBreathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(0.88); }
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideFadeIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawIn {
      from { width: 0; }
      to   { width: 32px; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 28px 22px 22px; border-radius: 20px; }
      .logo-stage { width: 130px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="space-bg" aria-hidden="true"></div>
  <div class="aurora" aria-hidden="true"></div>
  <canvas id="sky" aria-hidden="true"></canvas>
  <div class="horizon" aria-hidden="true"></div>

  <main class="card" role="main">
    <header class="card-top">
      <div class="logo-stage" aria-label="Jay Marketing Lab">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 118 512 234">
          <defs>
            <style>
              /* Dark-background adaptive variant per JML brand guide.
                 J body switches to white, search icon stays brand purple
                 (visible against the white J), bar outline becomes white. */
              .s1 { fill:#b1eb1e; stroke:#4c0099; stroke-miterlimit:10; stroke-width:2.2px; }
              .s2 { fill:none; stroke:#FFFFFF; stroke-miterlimit:10; stroke-width:1.47px; }
              .s4 { fill:#b1eb1e; stroke:#4c0099; stroke-miterlimit:10; stroke-width:1.47px; }
              .s5 { fill:#b1eb1e; stroke-width:0; }
              .s6 { fill:#FFFFFF; stroke-width:0; }   /* J body — white on dark */
              .s7 { fill:#4c0099; stroke-width:0; }   /* Search icon — purple, visible on white J */
            </style>

      <button class="qr-close" id="qrClose" aria-label="Close QR code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="qr-label">SCAN TO CONNECT</div>
      <h3 id="qrTitle" class="qr-title">Jay <span>Zahiri</span></h3>
      <div class="qr-img-wrap">
        <div class="qr-loading" id="qrLoading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </div>
        <div class="qr-error" id="qrError">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>QR generation needs internet.<br/>Use the URL below.</span>
        </div>
        <img id="qrImg" alt="QR code linking to this card" />
      </div>
      <p class="qr-url" id="qrUrl">—</p>
      <button class="btn btn-secondary qr-download" type="button" id="qrDownload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download QR
      </button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    /* ─── Scene staging via Web Animations API ─────────────────────────────
       Measures where logo + avatar will land in the final card layout, then
       animates them from a centered viewport position back to those spots.
       Uses WAAPI (not CSS @keyframes) so dynamic transform values resolve
       reliably across browsers. CSS handles the static cascade for the rest. */
    (function () {
      var EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';
      var LOGO_SCALE   = 2;
      var AVATAR_SCALE = 2.5;

      function setupScene() {
        var logo   = document.querySelector('.logo-stage');
        var avatar = document.querySelector('.avatar-wrap');
        if (!logo || !avatar) return;

        // Measure natural positions in card layout (with no transforms applied)
        var logoRect   = logo.getBoundingClientRect();
        var avatarRect = avatar.getBoundingClientRect();
        var vw = window.innerWidth;
        var vh = window.innerHeight;

        // Scaled sizes during scene 1
        var logoScaledW      = logoRect.width  * LOGO_SCALE;
        var logoScaledH      = logoRect.height * LOGO_SCALE;
        var avatarScaledSize = avatarRect.width * AVATAR_SCALE;

        // Side-by-side: logo on the left, headshot on the right.
        // Vertically centered in viewport.
        var gap = Math.max(24, vw * 0.025);
        var pairW = logoScaledW + gap + avatarScaledSize;
        // If the pair is wider than the viewport (small screens), shrink it
        var maxPairW = vw * 0.88;
        if (pairW > maxPairW) {
          var shrink = maxPairW / pairW;
          // Shrink the scales proportionally for narrow viewports
          var adjustedLogoScale   = LOGO_SCALE * shrink;
          var adjustedAvatarScale = AVATAR_SCALE * shrink;
          logoScaledW      = logoRect.width  * adjustedLogoScale;
          logoScaledH      = logoRect.height * adjustedLogoScale;
          avatarScaledSize = avatarRect.width * adjustedAvatarScale;
          gap *= shrink;
          pairW = logoScaledW + gap + avatarScaledSize;
        }
        var pairLeft = (vw - pairW) / 2;

        // Targets: both vertically centered, logo on left, avatar on right
        var logoTargetX   = pairLeft + logoScaledW / 2;
        var logoTargetY   = vh / 2;
        var avatarTargetX = pairLeft + logoScaledW + gap + avatarScaledSize / 2;
        var avatarTargetY = vh / 2;

        // Natural centers
        var logoCenter   = { x: logoRect.left   + logoRect.width   / 2, y: logoRect.top   + logoRect.height / 2 };
        var avatarCenter = { x: avatarRect.left + avatarRect.width / 2, y: avatarRect.top  + avatarRect.height / 2 };

        // Deltas
        var logoDX   = logoTargetX   - logoCenter.x;
        var logoDY   = logoTargetY   - logoCenter.y;
        var avatarDX = avatarTargetX - avatarCenter.x;
        var avatarDY = avatarTargetY - avatarCenter.y;

        // Compute actual scales used (after potential shrinking)
        var logoScaleUsed   = logoScaledW / logoRect.width;
        var avatarScaleUsed = avatarScaledSize / avatarRect.width;

        var logoCentered   = 'translate(' + logoDX   + 'px, ' + logoDY   + 'px) scale(' + logoScaleUsed   + ')';
        var avatarCentered = 'translate(' + avatarDX + 'px, ' + avatarDY + 'px) scale(' + avatarScaleUsed + ')';
        var logoFinal      = 'translate(0, 0) scale(1)';
        var avatarFinal    = 'translate(0, 0) scale(1)';

        // ── Logo: fade-in (held at centered/scaled position) ──
        logo.animate(
          [
            { opacity: 0, transform: logoCentered },
            { opacity: 1, transform: logoCentered }
          ],
          { duration: 800, delay: 200, easing: EASE, fill: 'both' }
        );

        // ── Logo: move from centered/scaled → final position/scale ──
        var logoMove = logo.animate(
          [
            { transform: logoCentered },
            { transform: logoFinal }
          ],
          { duration: 1100, delay: 2700, easing: EASE, fill: 'both' }
        );

        // ── Logo: idle float (after move completes) ──
        logoMove.finished.then(function () {
          logo.animate(
            [
              { transform: 'translate(0, 0) scale(1)' },
              { transform: 'translate(0, -3px) scale(1)' },
              { transform: 'translate(0, 0) scale(1)' }
            ],
            { duration: 8000, iterations: Infinity, easing: 'ease-in-out' }
          );
        }).catch(function () { /* animation cancelled */ });

        // ── Avatar: pop-in with bounce (held at centered/scaled position) ──
        avatar.animate(
          [
            { opacity: 0, transform: 'translate(' + avatarDX + 'px, ' + avatarDY + 'px) scale(' + (avatarScaleUsed * 0.32) + ')', offset: 0 },
            { opacity: 1, transform: 'translate(' + avatarDX + 'px, ' + avatarDY + 'px) scale(' + (avatarScaleUsed * 1.08) + ')', offset: 0.7 },
            { opacity: 1, transform: avatarCentered, offset: 1 }
          ],
          { duration: 1000, delay: 900, easing: EASE, fill: 'both' }
        );

        // ── Avatar: move from centered/scaled → final ──
        avatar.animate(
          [
            { transform: avatarCentered },
            { transform: avatarFinal }
          ],
          { duration: 1100, delay: 2700, easing: EASE, fill: 'both' }
        );

        // Trigger CSS animations for everything else (logo SVG children, card frame, content cascade)
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.add('ready');
          });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupScene);
      } else {
        setupScene();
      }
    })();

    /* ─── Nightsky background ─── */
    (function () {
      const canvas = document.getElementById('sky');
      const ctx    = canvas.getContext('2d');

      let W, H;
      let stars   = [];
      let meteors = [];
      let mouse   = { x: -9999, y: -9999 };

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        buildStars();
      }
      window.addEventListener('resize', resize);

      function buildStars() {
        stars = [];
        const n = Math.round((W * H) / 5500);
        for (let i = 0; i < n; i++) {
          const layer = Math.random();
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            ox: 0, oy: 0,
            r: 0.4 + layer * 2.0,
            layer,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            phase:   Math.random() * Math.PI * 2,
            twSpeed: 0.6 + Math.random() * 1.2,
            hue: Math.random() < 0.12 ? (Math.random() < 0.5 ? 200 : 38) : null,
          });
        }
      }

      function spawnMeteor() {
        const spd = 9 + Math.random() * 14;
        const zone = Math.random();
        let startX, startY, angle;

        if (zone < 0.35) {
          startX = Math.random() * W * 0.45;
          startY = -10 - Math.random() * 60;
          angle  = Math.PI / 5.5 + (Math.random() - 0.5) * 0.4;
        } else if (zone < 0.65) {
          startX = W * 0.55 + Math.random() * W * 0.5;
          startY = -10 - Math.random() * 60;
          angle  = Math.PI - Math.PI / 5.5 + (Math.random() - 0.5) * 0.4;
        } else if (zone < 0.82) {
          startX = W * 0.3 + Math.random() * W * 0.4;
          startY = -10 - Math.random() * 40;
          angle  = Math.PI / 3.5 + (Math.random() - 0.5) * 0.3;
        } else {
          startX = W + 10;
          startY = Math.random() * H * 0.45;
          angle  = Math.PI * 0.72 + (Math.random() - 0.5) * 0.3;
        }

        meteors.push({
          x: startX, y: startY,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          tail: 90 + Math.random() * 180,
          life: 1,
          decay: 0.007 + Math.random() * 0.013,
          width: 0.9 + Math.random() * 1.4,
        });
      }

      function scheduleMeteor() {
        const delay = 2500 + Math.random() * 3500;
        setTimeout(() => {
          spawnMeteor();
          if (Math.random() < 0.3) setTimeout(spawnMeteor, 120 + Math.random() * 250);
          scheduleMeteor();
        }, delay);
      }

      window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      const REPEL_R   = 130;
      const CONNECT_D = 110;
      let t = 0;

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (const s of stars) {
          s.x += s.vx;
          s.y += s.vy;
          if (s.x < -5)  s.x = W + 5;
          if (s.x > W+5) s.x = -5;
          if (s.y < -5)  s.y = H + 5;
          if (s.y > H+5) s.y = -5;

          const dx = s.x - mouse.x;
          const dy = s.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < REPEL_R && dist > 0) {
            const force = (REPEL_R - dist) / REPEL_R;
            s.ox += (dx / dist) * force * 4;
            s.oy += (dy / dist) * force * 4;
          }
          s.ox *= 0.92;
          s.oy *= 0.92;

          const px = s.x + s.ox;
          const py = s.y + s.oy;

          const tw = Math.sin(t * s.twSpeed + s.phase);
          const alpha = Math.min(1, 0.45 + s.layer * 0.45 + tw * 0.1);
          const rad = s.r * (0.82 + tw * 0.18);

          ctx.fillStyle = s.hue
            ? `hsla(${s.hue}, 80%, 88%, ${alpha})`
            : `rgba(230, 240, 255, ${alpha})`;
          ctx.beginPath();
          ctx.arc(px, py, rad, 0, Math.PI * 2);
          ctx.fill();

          if (s.layer > 0.65 && rad > 1.1) {
            const g = ctx.createRadialGradient(px, py, 0, px, py, rad * 5);
            g.addColorStop(0, `rgba(200, 220, 255, ${alpha * 0.22})`);
            g.addColorStop(1, 'transparent');
            ctx.beginPath();
            ctx.fillStyle = g;
            ctx.arc(px, py, rad * 5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        for (let i = 0; i < stars.length; i++) {
          const a = stars[i];
          const ax = a.x + a.ox;
          const ay = a.y + a.oy;
          for (let j = i + 1; j < stars.length; j++) {
            const b = stars[j];
            if (Math.abs(a.layer - b.layer) > 0.25) continue;
            const bx = b.x + b.ox;
            const by = b.y + b.oy;
            const ddx = ax - bx;
            const ddy = ay - by;
            const d = Math.sqrt(ddx * ddx + ddy * ddy);
            if (d < CONNECT_D) {
              const a2 = (1 - d / CONNECT_D) * 0.09 * (0.5 + a.layer * 0.5);
              ctx.strokeStyle = `rgba(180, 200, 255, ${a2})`;
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(ax, ay);
              ctx.lineTo(bx, by);
              ctx.stroke();
            }
          }
        }

        for (let i = meteors.length - 1; i >= 0; i--) {
          const m = meteors[i];
          m.x += m.vx;
          m.y += m.vy;
          m.life -= m.decay;

          if (m.life <= 0 || m.x > W + 300 || m.y > H + 300) {
            meteors.splice(i, 1);
            continue;
          }

          const norm = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
          const tailX = m.x - (m.vx / norm) * m.tail * m.life;
          const tailY = m.y - (m.vy / norm) * m.tail * m.life;

          const g = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
          g.addColorStop(0,    `rgba(240, 255, 200, ${m.life * 0.95})`);
          g.addColorStop(0.15, `rgba(177, 235, 30,   ${m.life * 0.55})`);
          g.addColorStop(0.5,  `rgba(160, 200, 255, ${m.life * 0.18})`);
          g.addColorStop(1,    'rgba(100, 140, 255, 0)');

          ctx.strokeStyle = g;
          ctx.lineWidth   = m.width * m.life;
          ctx.lineCap     = 'round';
          ctx.beginPath();
          ctx.moveTo(m.x, m.y);
          ctx.lineTo(tailX, tailY);
          ctx.stroke();

          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 255, 240, ${m.life * 0.95})`;
          ctx.arc(m.x, m.y, m.width * 1.5 * m.life, 0, Math.PI * 2);
          ctx.fill();
        }

        t += 0.007;
        requestAnimationFrame(draw);
      }

      resize();
      scheduleMeteor();
      setTimeout(spawnMeteor, 600);
      setTimeout(spawnMeteor, 1800);
      draw();
    })();

    /* ─── Card actions ─── */
    var toast = document.getElementById('toast');
    var toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2400);
    }

    document.getElementById('saveContact').addEventListener('click', function () {
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Jay Zahiri',
        'N:Zahiri;Jay;;;',
        'ORG:Jay Marketing Lab',
        'TITLE:CEO',
        'EMAIL;TYPE=WORK:jay@jaymarketinglab.com',
        'EMAIL;TYPE=HOME:zahiri.j@gmail.com',
        'TEL;TYPE=CELL:+18583442202',
        'URL:https://jaymarketinglab.com',
        'ADR;TYPE=WORK:;;;San Diego;CA;;USA',
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Jay-Zahiri.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      showToast('Contact downloaded');
    });

    document.getElementById('shareCard').addEventListener('click', async function () {
      var data = {
        title: 'Jay Zahiri — Jay Marketing Lab',
        text: 'We stay, you scale.',
        url: window.location.href
      };
      if (navigator.share) {
        try {
          await navigator.share(data);
          return;
        } catch (e) { /* user cancelled or share failed */ }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(window.location.href);
          showToast('Link copied to clipboard');
          return;
        } catch (e) { /* not in secure context */ }
      }
      // Last fallback: open the QR modal which shows the URL clearly
      openQR();
      showToast('Tap the URL below the QR to copy');
    });

    /* ─── Text Me: always show phone in a toast as fallback,
           since sms: may be blocked by chat-app WebViews on mobile ─── */
    (function () {
      var textMeLink = document.getElementById('textMe');
      var PHONE_DISPLAY = '+1 (858) 344-2202';
      var PHONE_RAW     = '+18583442202';

      function isMobile() {
        return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini/i.test(navigator.userAgent);
      }

      textMeLink.addEventListener('click', async function () {
        // Try to copy the number (works in most contexts)
        var copied = false;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          try {
            await navigator.clipboard.writeText(PHONE_RAW);
            copied = true;
          } catch (e) { /* clipboard blocked */ }
        }

        // Always tell the user what to text — works whether sms: opened or not
        setTimeout(function () {
          if (isMobile()) {
            showToast(copied
              ? PHONE_DISPLAY + ' copied — if Messages didn\'t open, paste it'
              : 'Text Jay at ' + PHONE_DISPLAY);
          } else {
            showToast(copied
              ? PHONE_DISPLAY + ' copied — text from your phone'
              : 'Text Jay at ' + PHONE_DISPLAY);
          }
        }, 400);
        // Let the sms: link fire naturally — don't preventDefault
      });
    })();

    /* ─── QR code modal with multi-API fallback ─── */
    var qrModal    = document.getElementById('qrModal');
    var qrImg      = document.getElementById('qrImg');
    var qrUrl      = document.getElementById('qrUrl');
    var qrLoading  = document.getElementById('qrLoading');
    var qrError    = document.getElementById('qrError');
    var qrCardURL  = '';

    var QR_APIS = [
      function (url, size) {
        return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size +
               '&margin=0&data=' + encodeURIComponent(url);
      },
      function (url, size) {
        return 'https://quickchart.io/qr?size=' + size + '&margin=0&text=' + encodeURIComponent(url);
      }
    ];

    function loadQRWithFallbacks(url, size, idx) {
      idx = idx || 0;
      if (idx >= QR_APIS.length) {
        // All APIs failed
        qrLoading.classList.add('hidden');
        qrError.classList.add('show');
        return;
      }
      qrImg.onload = function () {
        qrLoading.classList.add('hidden');
        qrError.classList.remove('show');
        qrImg.classList.add('loaded');
      };
      qrImg.onerror = function () {
        loadQRWithFallbacks(url, size, idx + 1);
      };
      qrImg.src = QR_APIS[idx](url, size);
    }

    function openQR() {
      qrCardURL = (window.location.protocol === 'file:' || window.location.host === '')
        ? 'https://jaymarketinglab.com'
        : window.location.href;

      qrUrl.textContent = qrCardURL;

      // Reset states
      qrImg.classList.remove('loaded');
      qrImg.removeAttribute('src');
      qrError.classList.remove('show');
      qrLoading.classList.remove('hidden');

      qrModal.hidden = false;
      document.body.style.overflow = 'hidden';

      // Try loading after the modal is visible
      requestAnimationFrame(function () {
        loadQRWithFallbacks(qrCardURL, 440, 0);
      });
    }

    function closeQR() {
      qrModal.hidden = true;
      document.body.style.overflow = '';
    }

    document.getElementById('showQR').addEventListener('click', openQR);
    document.getElementById('qrClose').addEventListener('click', closeQR);
    document.getElementById('qrBackdrop').addEventListener('click', closeQR);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !qrModal.hidden) closeQR();
    });

    // Click URL to copy — with fallback for non-secure contexts
    qrUrl.addEventListener('click', async function () {
      var url = qrUrl.textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(url);
          showToast('URL copied');
          return;
        } catch (e) { /* fall through */ }
      }
      // Fallback: select the text so user can manually copy
      var range = document.createRange();
      range.selectNodeContents(qrUrl);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      try {
        document.execCommand('copy');
        showToast('URL copied');
      } catch (e) {
        showToast('URL selected — press Cmd/Ctrl+C to copy');
      }
    });

    document.getElementById('qrDownload').addEventListener('click', async function () {
      try {
        var resp = await fetch(QR_APIS[0](qrCardURL, 1000));
        if (!resp.ok) throw new Error('First API failed');
        var blob = await resp.blob();
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'Jay-Zahiri-QR.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        showToast('QR downloaded');
      } catch (e) {
        // Fallback: download whatever is currently shown
        try {
          var srcUrl = qrImg.src;
          var resp2 = await fetch(srcUrl);
          var blob2 = await resp2.blob();
          var url2 = URL.createObjectURL(blob2);
          var a2 = document.createElement('a');
          a2.href = url2;
          a2.download = 'Jay-Zahiri-QR.png';
          document.body.appendChild(a2);
          a2.click();
          document.body.removeChild(a2);
          setTimeout(function () { URL.revokeObjectURL(url2); }, 1000);
          showToast('QR downloaded');
        } catch (e2) {
          showToast('Download needs an internet connection');
        }
      }
    });
  </script>
