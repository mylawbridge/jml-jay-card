<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jay Zahiri · Jay Marketing Lab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #b1eb1e;
    --purple: #46008d;
    --purple-mid: #7a20e0;
    --dark: #05020f;
    --darker: #030108;
    --white: #f0eeff;
    --gray: #7a7a9a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; min-height:100%;
    background: var(--darker);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Radial purple bg */
  body::after {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% 10%, rgba(70,0,141,0.6) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  /* Corner brackets */
  .corners { position:fixed; inset:14px; pointer-events:none; z-index:10; }
  .corner {
    position:absolute; width:26px; height:26px;
    border-color:var(--lime); border-style:solid;
    animation: blink 3s ease-in-out infinite;
  }
  .corner.tl { top:0; left:0; border-width:3px 0 0 3px; }
  .corner.tr { top:0; right:0; border-width:3px 3px 0 0; animation-delay:.75s; }
  .corner.bl { bottom:0; left:0; border-width:0 0 3px 3px; animation-delay:1.5s; }
  .corner.br { bottom:0; right:0; border-width:0 3px 3px 0; animation-delay:2.25s; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .page {
    position:relative; z-index:2;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 40px 24px 48px;
    gap: 0;
  }

  .card {
    width:100%; max-width:420px;
    display:flex; flex-direction:column;
    align-items:center;
    animation: fadeUp .9s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center;
    gap:20px; width:100%;
    margin-bottom:30px;
    animation: fadeUp .9s .1s cubic-bezier(.16,1,.3,1) both;
  }

  /* Photo with SVG loading ring (headshot stays static, ring traces) */
  .photo-wrap {
    position:relative; flex-shrink:0;
    width:92px; height:92px;
  }
  .photo-wrap img {
    width:80px; height:80px;
    border-radius:50%;
    object-fit:cover; object-position:center top;
    position:absolute; top:6px; left:6px;
    z-index:2;
    /* Subtle inner glow to integrate with ring */
    box-shadow: 0 0 0 1px rgba(177,235,30,.15);
  }
  /* Faint background track ring */
  .trace-ring {
    position:absolute; inset:0;
    width:92px; height:92px;
    z-index:3; pointer-events:none;
    animation: ringSpin 2.4s linear infinite;
    transform-origin: center;
  }
  .trace-ring .ring-track {
    fill: none;
    stroke: rgba(177,235,30,0.12);
    stroke-width: 2;
  }
  .trace-ring .ring-arc {
    fill: none;
    stroke: var(--lime);
    stroke-width: 2.5;
    stroke-linecap: round;
    /* Arc is ~30% of circumference (circ ~ 270) */
    stroke-dasharray: 80 270;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 4px rgba(177,235,30,0.55));
    /* Initial trace-in on load */
    animation: traceIn 1.4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes ringSpin {
    to { transform: rotate(360deg); }
  }
  @keyframes traceIn {
    from { stroke-dasharray: 0 350; }
    to   { stroke-dasharray: 80 270; }
  }

  /* Name */
  .name-block { flex:1; min-width:0; }
  .name-line {
    font-family: 'DM Serif Display', serif;
    line-height: 0.95;
    letter-spacing: -0.01em;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .name-jay {
    font-size: 3.6rem;
    color: var(--white);
    font-style: italic;
    line-height: 0.9;
  }
  .name-zahiri {
    font-size: 1.85rem;
    color: var(--lime);
    line-height: 1;
    margin-top: 2px;
  }
  .company {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--purple-mid);
    margin-top: 8px;
  }

  /* ── QR ── */
  .qr-wrap {
    width:100%; max-width:340px;
    animation: fadeUp .9s .2s cubic-bezier(.16,1,.3,1) both;
  }
  .qr-border {
    border: 1.5px solid rgba(177,235,30,0.22);
    border-radius: 18px;
    padding: 14px;
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(12px);
    position: relative; overflow: hidden;
  }
  .qr-border::before {
    content:'';
    position:absolute; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent 0%, var(--lime) 50%, transparent 100%);
    animation: scan 2.8s ease-in-out infinite;
    z-index:3;
  }
  @keyframes scan {
    0%   { top:8%;  opacity:0; }
    8%   { opacity:.9; }
    92%  { opacity:.9; }
    100% { top:92%; opacity:0; }
  }
  .qr-img { width:100%; border-radius:8px; display:block; }

  /* ── SCAN LABEL ── */
  .scan-label {
    display:flex; align-items:center;
    gap:10px; width:100%; max-width:340px;
    margin-top:18px;
    animation: fadeUp .9s .35s cubic-bezier(.16,1,.3,1) both;
  }
  .scan-line { flex:1; height:1px; }
  .scan-line.l { background: linear-gradient(90deg, transparent, rgba(177,235,30,.45)); }
  .scan-line.r { background: linear-gradient(270deg, transparent, rgba(177,235,30,.45)); }
  .scan-text {
    font-family: 'JetBrains Mono', monospace;
    font-size:.62rem; font-weight:500;
    letter-spacing:.22em; text-transform:uppercase;
    color:var(--lime);
  }

  /* ── URL PILL ── */
  .url-pill {
    margin-top:12px;
    padding:9px 22px;
    border:1px solid rgba(177,235,30,.22);
    border-radius:999px;
    font-family: 'JetBrains Mono', monospace;
    font-size:.7rem; color:var(--gray);
    letter-spacing:.02em;
    text-decoration:none;
    transition: all .2s;
    animation: fadeUp .9s .45s cubic-bezier(.16,1,.3,1) both;
    display:inline-block;
  }
  .url-pill:active { background:rgba(177,235,30,.1); color:var(--lime); border-color:var(--lime); }

  /* ── CTA ── */
  .cta-btn {
    margin-top:20px;
    width:100%; max-width:340px;
    padding:16px;
    background:var(--lime); color:var(--dark);
    border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:.92rem; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase;
    text-align:center; text-decoration:none;
    display:block; cursor:pointer;
    box-shadow: 0 0 32px rgba(177,235,30,.3);
    transition: transform .15s, box-shadow .15s;
    animation: fadeUp .9s .55s cubic-bezier(.16,1,.3,1) both;
  }
  .cta-btn:active { transform:scale(.97); box-shadow:0 0 16px rgba(177,235,30,.2); }

  /* ── REAL LOGO (dark theme) ── */
  .logo-section {
    margin-top:32px;
    width:100%; max-width:280px;
    animation: fadeUp .9s .65s cubic-bezier(.16,1,.3,1) both;
    opacity:.92;
  }
  .logo-section svg { width:100%; height:auto; display:block; }
  /* Color classes — white + lime on dark */
  .logo-section .s1 { fill:#ffffff; stroke:none; stroke-width:0; }
  .logo-section .s2 { fill:none; stroke:#b1eb1e; stroke-miterlimit:10; stroke-width:1.47px; }
  .logo-section .s4 { fill:#ffffff; stroke:none; stroke-width:0; }
  .logo-section .s5 { fill:#b1eb1e; stroke-width:0; }
  .logo-section .s6 { fill:#ffffff; stroke-width:0; }

</style>
</head>
